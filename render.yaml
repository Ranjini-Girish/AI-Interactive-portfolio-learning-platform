# Render Blueprint — career-simulator inside monorepo (rootDir: career-simulator)

services:
  - type: web
    name: career-sim-api
    runtime: docker
    rootDir: career-simulator
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: career-sim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: career-sim-db
    plan: free
    databaseName: career_simulator
    user: career_sim
